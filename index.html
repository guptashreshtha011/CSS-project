<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify -Web Player Music For Everyone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/logo.png">
    <link href="style.css"  rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="main"></div>
    <div class="sidebar">
        <div class="nav">
            <div class="nav-option" style="opacity:1;">
                <i class="fa-solid fa-house"></i>
                <a href="/home">Home</a>
            </div>
            <div class="nav-option">
                <i class="fa-solid fa-magnifying-glass"></i>
                <a href="/Search">Search</a>
            </div>
        </div>
        <div class="library">
            <div class="options">
             <div class="lib-option nav-option">
                <!-- we gave library option class nav-option too so that nav option style can be applied to it too -->
                <img src="./assets/library_icon.png">
                <!-- couldn't find it in fontawesom so pasted an image insted -->
                <a href="/library">Your Library</a>
             </div>
             <div class="icons">
                <i class="fa-solid fa-plus"></i>
                <i class="fa-solid fa-arrow-right"></i>
             </div>
            </div>
            <div class="boxes">
                <div class="box">
                    <p class="box-p1">Create your first playlist</p>
                    <p class="box-p2">It's easy, we'll help you</p>
                    <button blass="badge">Create Playlist</button>
                </div>
                <div class="box">
                    <p class="box-p1">Let's find some podcast to follow</p>
                    <p class="box-p2">we'll keep you updated on new episodes</p>
                    <button blass="badge">Browse podcast</button>
                </div>
            </div>
        </div>
    </div>
    <div class="maincontent">
        <div class="sticky-nav">
            <div class="sticky-nav-icons">
            <img src="./assets/backward_icon.png">
            <img src="./assets/forward_icon.png" class="hide">
            </div>
            <div class="sticky-nav-options">
            <button blass="badge nav-item hide">Explore Premium</button>
            <button blass="badge nav-item dark-badge" ><i class="fa-regularfa-circle-down" style="margin-right:5px"></i>Install App</button>
            <i class="fa-regular fa-user nav-item"></i>
            </div>
        </div>
        <div class="cards"></div>
    </div>
    <div class="musicplayer">music player</div> 
</body>
</html>
